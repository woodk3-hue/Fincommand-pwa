<title>Financial Command Centre</title>
<style>
:root {
  --bg:#0A0E1A; --bg2:#111827; --card:#1A2235; --card2:#1E2845; --inp:#0F1626; --sheet:#131D2F;
  --teal:#00D4B4; --teal-dim:#00A896; --teal-glow:rgba(0,212,180,0.13);
  --amber:#F59E0B; --red:#EF4444; --green:#10B981; --purple:#8B5CF6; --blue:#3B82F6; --pink:#EC4899;
  --t1:#E8EDF5; --t2:#7A8BA6; --t3:#4A5A72;
  --border:rgba(255,255,255,0.07); --border-teal:rgba(0,212,180,0.28);
  --nav-h:64px; --r:14px; --r-sm:10px; --r-lg:22px;
  --mono:'JetBrains Mono','Fira Code','Consolas',monospace;
  --ui:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;font-size:16px;-webkit-text-size-adjust:100%;touch-action:manipulation}
body{min-height:100%;background:var(--bg);color:var(--t1);font-family:var(--ui);overflow-x:hidden;-webkit-font-smoothing:antialiased;padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom))}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,180,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,180,0.022) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0}
#app{position:relative;z-index:1;max-width:480px;margin:0 auto;min-height:100vh}
.topbar{position:sticky;top:0;z-index:100;background:rgba(10,14,26,0.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;min-height:54px}
.topbar-title{font-family:var(--mono);font-size:0.8rem;font-weight:700;color:var(--teal);letter-spacing:0.1em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.pulse{width:8px;height:8px;background:var(--teal);border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.35;transform:scale(0.75)}}
.topbar-actions{display:flex;gap:7px}
.icon-btn{width:38px;height:38px;border:none;border-radius:9px;background:var(--card);color:var(--t2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;transition:all 0.18s;-webkit-tap-highlight-color:transparent}
.icon-btn:active{background:var(--card2);color:var(--teal);transform:scale(0.93)}
.view{display:none;padding:12px 14px 28px;animation:fadeIn 0.18s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.sh{display:flex;align-items:center;justify-content:space-between;margin:18px 0 10px}
.sh:first-child{margin-top:4px}
.sh-title{font-size:0.68rem;font-weight:700;color:var(--t3);letter-spacing:0.12em;text-transform:uppercase;font-family:var(--mono)}
.sh-btn{font-size:0.73rem;color:var(--teal);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;font-family:var(--mono);-webkit-tap-highlight-color:transparent}
.card{background:var(--card);border:1px solid rgba(255,255,255,0.055);border-radius:var(--r);padding:15px;margin-bottom:9px;position:relative;overflow:hidden;transition:background 0.18s}
.card.tap{cursor:pointer}.card.tap:active{background:var(--card2)}
.card.teal{border-left:3px solid var(--teal)}.card.amber{border-left:3px solid var(--amber)}
.card.red{border-left:3px solid var(--red)}.card.green{border-left:3px solid var(--green)}
.card.purple{border-left:3px solid var(--purple)}
.card-row{display:flex;align-items:center;justify-content:space-between}
.clabel{font-size:0.75rem;color:var(--t2);margin-bottom:3px;font-weight:500}
.cval{font-family:var(--mono);font-size:1.35rem;font-weight:700;font-variant-numeric:tabular-nums}
.csub{font-size:0.72rem;color:var(--t3);margin-top:3px;font-family:var(--mono)}
.hero{background:linear-gradient(135deg,#0D1525 0%,#1A2A3A 100%);border:1px solid var(--border-teal);border-radius:var(--r-lg);padding:22px;margin-bottom:13px;position:relative;overflow:hidden;box-shadow:0 0 28px rgba(0,212,180,0.1)}
.hero::after{content:'';position:absolute;top:-50px;right:-50px;width:200px;height:200px;background:radial-gradient(circle,rgba(0,212,180,0.07) 0%,transparent 70%);pointer-events:none}
.hero-eye{font-family:var(--mono);font-size:0.62rem;color:var(--teal);text-transform:uppercase;letter-spacing:0.14em;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.hero-amt{font-family:var(--mono);font-size:2.5rem;font-weight:700;letter-spacing:-0.03em;line-height:1;margin-bottom:5px;font-variant-numeric:tabular-nums}
.hero-lbl{font-size:0.78rem;color:var(--t2);margin-bottom:18px}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hero-stat{background:rgba(0,0,0,0.22);border-radius:9px;padding:10px 12px}
.hero-stat-lbl{font-size:0.62rem;color:var(--t3);text-transform:uppercase;letter-spacing:0.1em;font-family:var(--mono);margin-bottom:2px}
.hero-stat-val{font-family:var(--mono);font-size:0.92rem;font-weight:600;font-variant-numeric:tabular-nums}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.stat-card{background:var(--card);border:1px solid rgba(255,255,255,0.055);border-radius:var(--r-sm);padding:13px}
.stat-lbl{font-size:0.62rem;color:var(--t3);text-transform:uppercase;letter-spacing:0.1em;font-family:var(--mono);margin-bottom:4px}
.stat-val{font-family:var(--mono);font-size:1.05rem;font-weight:700;font-variant-numeric:tabular-nums}
.pos{color:var(--green)}.neg{color:var(--red)}.warn{color:var(--amber)}.acc{color:var(--teal)}
.prog-track{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:3px;background:var(--teal);transition:width 0.5s ease}
.prog-fill.amber{background:var(--amber)}.prog-fill.red{background:var(--red)}.prog-fill.green{background:var(--green)}
.bank-group{margin-bottom:8px;border-radius:var(--r);overflow:hidden;border:1px solid rgba(255,255,255,0.055)}
.bank-group-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;background:var(--card);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background 0.18s}
.bank-group-hdr:active{background:var(--card2)}
.bank-group-left{display:flex;align-items:center;gap:10px}
.bank-group-name{font-size:0.88rem;font-weight:700}
.bank-group-total{font-family:var(--mono);font-size:0.82rem;color:var(--t2);font-variant-numeric:tabular-nums}
.bank-chevron{font-size:0.7rem;color:var(--t3);transition:transform 0.2s}
.bank-group.open .bank-chevron{transform:rotate(180deg)}
.bank-group-body{display:none;background:var(--inp);border-top:1px solid var(--border)}
.bank-group.open .bank-group-body{display:block}
.acc-item{display:flex;align-items:center;padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.18s;-webkit-tap-highlight-color:transparent}
.acc-item:last-child{border-bottom:none}
.acc-item:active{background:rgba(255,255,255,0.04)}
.acc-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-right:11px}
.acc-info{flex:1;min-width:0}
.acc-name{font-size:0.86rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acc-bank{font-size:0.69rem;color:var(--t3);margin-top:1px;font-family:var(--mono)}
.acc-bal{font-family:var(--mono);font-size:0.95rem;font-weight:600;font-variant-numeric:tabular-nums;text-align:right}
.credit-bar-wrap{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:4px;overflow:hidden}
.credit-bar-fill{height:100%;border-radius:2px;background:var(--red)}
.bill-item{display:flex;align-items:flex-start;padding:12px 14px;background:var(--card);border-radius:var(--r-sm);margin-bottom:7px;border-left:3px solid var(--t3)}
.bill-item.red-bill{border-left-color:var(--red)}.bill-item.amber-bill{border-left-color:var(--amber)}.bill-item.green-bill{border-left-color:var(--green)}
.bill-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.95rem;flex-shrink:0;margin-right:11px;margin-top:1px}
.bill-info{flex:1;min-width:0}
.bill-name{font-size:0.86rem;font-weight:700}
.bill-meta{font-size:0.69rem;color:var(--t3);margin-top:2px;font-family:var(--mono);line-height:1.6}
.bill-right{text-align:right;flex-shrink:0;margin-left:10px}
.bill-amt{font-family:var(--mono);font-size:1rem;font-weight:700;font-variant-numeric:tabular-nums}
.bill-days{font-size:0.68rem;font-family:var(--mono);margin-top:3px}
.tx-item{display:flex;align-items:center;padding:11px 13px;background:var(--card);border:1px solid rgba(255,255,255,0.055);border-radius:var(--r-sm);margin-bottom:6px;cursor:pointer;transition:background 0.18s}
.tx-item:active{background:var(--card2)}
.tx-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;margin-right:11px}
.tx-det{flex:1;min-width:0}
.tx-desc{font-size:0.86rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:0.7rem;color:var(--t3);margin-top:1px;font-family:var(--mono)}
.tx-amt{font-family:var(--mono);font-size:0.93rem;font-weight:700;text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.pay-input-wrap{background:var(--card);border:1px solid var(--border-teal);border-radius:var(--r);padding:18px;margin-bottom:13px}
.pay-input-label{font-size:0.68rem;font-family:var(--mono);color:var(--teal);text-transform:uppercase;letter-spacing:0.1em;display:block;margin-bottom:7px}
.big-input{width:100%;background:var(--inp);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--t1);font-family:var(--mono);font-size:1.6rem;font-weight:700;padding:11px 14px;outline:none;transition:border-color 0.2s;font-variant-numeric:tabular-nums}
.big-input:focus{border-color:var(--teal)}
.chk-item{display:flex;align-items:center;padding:11px 13px;background:var(--card);border:1px solid rgba(255,255,255,0.055);border-radius:var(--r-sm);margin-bottom:6px;cursor:pointer;transition:all 0.18s;-webkit-tap-highlight-color:transparent}
.chk-item.done{opacity:0.5;border-color:var(--green)}
.chk-circle{width:25px;height:25px;border:2px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:11px;font-size:0.72rem;transition:all 0.18s;color:#fff}
.chk-item.done .chk-circle{background:var(--green);border-color:var(--green)}
.chk-label{flex:1;font-size:0.86rem;font-weight:500}
.chk-amt{font-family:var(--mono);font-size:0.88rem;font-weight:600;color:var(--t2)}
.pay-summary{background:linear-gradient(135deg,#0D1A12 0%,#0A1A24 100%);border:1px solid rgba(16,185,129,0.28);border-radius:var(--r);padding:15px;margin-top:13px}
.pay-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:0.84rem}
.pay-row.total{border-top:1px solid var(--border);margin-top:5px;padding-top:11px;font-weight:700;font-size:0.97rem}
.pay-hist-item{display:flex;align-items:center;padding:11px 13px;background:var(--card);border:1px solid rgba(255,255,255,0.055);border-radius:var(--r-sm);margin-bottom:6px;cursor:pointer}
.pay-hist-item:active{background:var(--card2)}
.tl-card{background:var(--card);border:1px solid rgba(255,255,255,0.055);border-radius:var(--r);margin-bottom:9px;overflow:hidden}
.tl-hdr{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tl-hdr:active{background:rgba(255,255,255,0.03)}

<script>
// ===== DB =====
const DB_NAME='FinCmdDB8',DB_VER=8;
const ST={ACC:'accounts',TX:'transactions',BILLS:'bills',SF:'sinkingFunds',PAY:'paydayTemplates',PROP:'properties',WISE:'wise',LOANS:'loans',INCOME:'income',PAYS:'payRecords',RENTS:'rentRecords',PERIODS:'payPeriods',SNAPS:'snapshots',BILLPAY:'billPayments',TRIPS:'trips',WISEEX:'wiseExchanges',WISESP:'wiseSpend',RATES:'interestRates',INSTAL:'instalments',DASHCFG:'dashConfig',CASH:'cashInHand',SETTLEMENTS:'settlements',ATMDRAW:'atmWithdrawals',TRIPCOSTS:'tripCosts'};
let _db=null;
function openDB(){
  return new Promise((res,rej)=>{
    if(_db)return res(_db);
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{const d=e.target.result;Object.values(ST).forEach(n=>{if(!d.objectStoreNames.contains(n))d.createObjectStore(n,{keyPath:'id',autoIncrement:true})});if(e.oldVersion<7&&e.oldVersion>0){const tx=e.target.transaction;const ws=tx.objectStore(ST.WISE);ws.getAll().onsuccess=ev=>{ev.target.result.forEach(w=>{w.amount=0;ws.put(w)})}}};
    r.onsuccess=e=>{_db=e.target.result;res(_db)};
    r.onerror=e=>rej(e.target.error);
  });
}
const gs=(n,m='readonly')=>_db.transaction(n,m).objectStore(n);
const dbGet=(s,id)=>new Promise((r,j)=>{const q=gs(s).get(id);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)});
const dbAll=(s)=>new Promise((r,j)=>{const q=gs(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)});
const dbPut=(s,item)=>new Promise((r,j)=>{const st=gs(s,'readwrite');const q=item.id?st.put(item):st.add(item);q.onsuccess=()=>r({...item,id:q.result});q.onerror=()=>j(q.error)});
const dbDel=(s,id)=>new Promise((r,j)=>{const q=gs(s,'readwrite').delete(id);q.onsuccess=()=>r();q.onerror=()=>j(q.error)});
const dbClear=(s)=>new Promise((r,j)=>{const q=gs(s,'readwrite').clear();q.onsuccess=()=>r();q.onerror=()=>j(q.error)});

// ===== SEED =====
async function seedData(){
  const ex=await dbAll(ST.ACC);
  if(ex.length>0)return;
  const accs=[
    {name:'Big Save',bank:'Macquarie',type:'savings',balance:40872.00,color:'#00D4B4',isAsset:true},
    {name:'Transaction Account',bank:'Macquarie',type:'transaction',balance:221.16,color:'#00D4B4',isAsset:true},
    {name:'Travel Save',bank:'Macquarie',type:'savings',balance:547.00,color:'#00D4B4',isAsset:true},
    {name:'Body Corporate Fund',bank:'Macquarie',type:'savings',balance:2351.00,color:'#00D4B4',isAsset:true},
    {name:'Groceries',bank:'HSBC',type:'transaction',balance:11.50,color:'#3B82F6',isAsset:true},
    {name:'Credit Card',bank:'HSBC',type:'credit',balance:-1351.29,color:'#EF4444',isAsset:false,creditLimit:6000,owing:1351.29},
    {name:'Bills',bank:'UP',type:'transaction',balance:202.11,color:'#8B5CF6',isAsset:true},
    {name:'Balloon Fund',bank:'UP',type:'savings',balance:2852.94,color:'#8B5CF6',isAsset:true},
    {name:'Griffin Transaction',bank:'Bank Australia',type:'transaction',balance:3736.00,color:'#F59E0B',isAsset:true},
    {name:'Griffin Mortgage',bank:'Bank Australia',type:'mortgage',balance:-344039.93,color:'#EF4444',isAsset:false},
    {name:'Bowen Hills Transaction',bank:'Bank Australia',type:'transaction',balance:5059.63,color:'#F59E0B',isAsset:true},
    {name:'Bowen Hills Mortgage',bank:'Bank Australia',type:'mortgage',balance:-410388.35,color:'#EF4444',isAsset:false},
    {name:'Spaceship',bank:'Spaceship',type:'investment',balance:600.00,color:'#6366F1',isAsset:true},
    {name:'PayPal',bank:'PayPal',type:'credit',balance:-139.47,color:'#EF4444',isAsset:false,creditLimit:1000,owing:139.47},
    {name:'Afterpay',bank:'Afterpay',type:'credit',balance:0.00,color:'#EC4899',isAsset:false,creditLimit:1000,owing:0}
  ];
  for(const a of accs)await dbPut(ST.ACC,a);
  const wise=[
    {currency:'AUD',symbol:'$',flag:'🇦🇺',amount:0},
    {currency:'JPY',symbol:'¥',flag:'🇯🇵',amount:0},
    {currency:'VND',symbol:'₫',flag:'🇻🇳',amount:0},
    {currency:'IDR',symbol:'Rp',flag:'🇮🇩',amount:0},
    {currency:'CNY',symbol:'¥',flag:'🇨🇳',amount:0}
  ];
  for(const w of wise)await dbPut(ST.WISE,w);
  const props=[
    {name:'Griffin',value:900000,mortgageBalance:344039.93,redraw:1853.56,mortgagePayment:980.41,extraPayment:50,ratesQtr:601.40,waterQtr:323.08,insuranceYr:1283.63,rentFn:1100,interestRate:5.84,mortgageAcc:'Griffin Transaction'},
    {name:'Bowen Hills',value:800000,mortgageBalance:410388.35,redraw:13488.29,mortgagePayment:1201.54,extraPayment:50,ratesQtr:293.80,waterQtr:297.86,insuranceYr:293.68,bodyCorporateQtr:2000,rentFn:750,futureRentFn:780,interestRate:5.84,mortgageAcc:'Bowen Hills Transaction'}
  ];
  for(const p of props)await dbPut(ST.PROP,p);
  // Seed initial interest rates
  const ratesSnap=await dbAll(ST.PROP);
  for(const p of ratesSnap){
    await dbPut(ST.RATES,{propertyId:p.id,propertyName:p.name,rate:5.84,effectiveDate:'2026-01-01',note:'Initial rate'});

const fmt=(n,d=2)=>{if(n===undefined||n===null||isNaN(n))return '$0.00';const a=Math.abs(n);return(n<0?'-$':'$')+a.toFixed(d).replace(/\B(?=(\d{3})+(?!\d))/g,',')};
const fmtF=(a,s)=>{const abs=Math.abs(a);const str=abs>=1e6?(abs/1e6).toFixed(2)+'M':abs>=1000?(abs/1000).toFixed(1)+'K':abs>=100?abs.toFixed(0):abs.toFixed(2);return(a<0?'-':'')+s+str};
const todayStr=()=>new Date().toISOString().split('T')[0];
const daysBetween=(d1,d2)=>{const a=new Date(d1+'T00:00:00'),b=new Date(d2+'T00:00:00');return Math.round((b-a)/864e5)};
const fmtDate=d=>{if(!d)return'';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})};
const fmtDateShort=d=>{if(!d)return'';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-AU',{day:'numeric',month:'short'})};
const roundUp=(n,x=5)=>Math.ceil(n/x)*x;

function showToast(msg,col='teal',dur=3.5){
  const t=document.getElementById('toast');
  t.style.setProperty('--toast-dur',dur+'s');
  t.textContent=msg;
  t.style.color=col==='red'?'var(--red)':col==='green'?'var(--green)':'var(--teal)';
  t.classList.remove('show');
  void t.offsetWidth; // force reflow
  t.classList.add('show');
  t.onclick=()=>{t.classList.remove('show')};
}
async function takeSnapshot(event='manual'){
  for(const a of accs){await dbPut(ST.SNAPS,{accountId:a.id,accountName:a.name,balance:a.balance,date:todayStr(),event})}
  snaps=await dbAll(ST.SNAPS);
}
function calcNextDueDate(fromDate,freq){
  const d=new Date(fromDate+'T00:00:00');
  if(freq==='weekly')d.setDate(d.getDate()+7);
  else if(freq==='fortnightly')d.setDate(d.getDate()+14);
  else if(freq==='monthly')d.setMonth(d.getMonth()+1);
  else if(freq==='quarterly')d.setMonth(d.getMonth()+3);
  else if(freq==='yearly')d.setFullYear(d.getFullYear()+1);
  return d.toISOString().split('T')[0];
}
async function checkDueBills(){
  const today=todayStr();
  const dueBills=bills.filter(b=>b.enabled&&b.dueDate&&b.dueDate<=today&&b.paidFrom);
  if(dueBills.length===0)return;
  const warnings=[];
  for(const b of dueBills){
    const acc=accs.find(a=>a.name===b.paidFrom);
    if(!acc){continue}
    if(acc.balance<b.amount){warnings.push(`Low funds: ${b.name} (${fmt(b.amount)}) from ${acc.name}`);continue}
    acc.balance-=b.amount;
    await dbPut(ST.ACC,acc);
    const tx={type:'expense',amount:b.amount,account:acc.name,category:b.cat||'bills',description:`Auto: ${b.name}`,date:today};
    const savedTx=await dbPut(ST.TX,tx);txs.push(savedTx);
    const bpRec={billId:b.id,billName:b.name,amount:b.amount,account:acc.name,date:today,automatic:true};
    const savedBp=await dbPut(ST.BILLPAY,bpRec);billPayHistory.push(savedBp);
    b.dueDate=calcNextDueDate(today,b.freq);
    await dbPut(ST.BILLS,b);
  }
  bills=await dbAll(ST.BILLS);
  if(warnings.length>0)warnings.forEach((w,i)=>setTimeout(()=>showToast(w,'red'),i*3500));
}

// ===== ACTIVE TRIP DETECTION =====
function _detectActiveTrip(){
  const today=todayStr();
  const active=trips.filter(t=>!t.completed&&t.startDate&&today>=t.startDate&&(!t.endDate||today<=t.endDate));
  if(active.length===0){activeTripId=null;return}
  // If previously selected active trip is still active, keep it
  if(activeTripId&&active.find(t=>t.id===activeTripId))return;
  // Pick earliest start date
  active.sort((a,b)=>a.startDate.localeCompare(b.startDate));
  activeTripId=active[0].id;
}
function getActiveTrip(){return trips.find(t=>t.id===activeTripId)||null}

// ===== CASH IN HAND HELPERS =====
function getCashBalance(currency){
  return cashInHand.filter(c=>c.currency===currency).reduce((s,c)=>s+c.balance,0);
}
async function setCashBalance(currency,symbol,newBalance){
  const existing=cashInHand.find(c=>c.currency===currency);
  if(existing){existing.balance=newBalance;await dbPut(ST.CASH,existing);const idx=cashInHand.findIndex(c=>c.currency===currency);if(idx>=0)cashInHand[idx]=existing;}
  else{const saved=await dbPut(ST.CASH,{currency,symbol,balance:newBalance});cashInHand.push(saved);}
}
function getAllCashCurrencies(){
  const byC={};
  cashInHand.forEach(c=>{if(!byC[c.currency])byC[c.currency]={currency:c.currency,symbol:c.symbol,balance:0};byC[c.currency].balance+=c.balance});
  return Object.values(byC);
}

async function checkTripCompletion(){
  const today=todayStr();
  for(const trip of trips){
    if(trip.completed)continue;
    if(trip.endDate&&today>trip.endDate&&!trip._promptedComplete){
      const daysOver=daysBetween(trip.endDate,today);
      const label=daysOver===1?'yesterday':`${daysOver} days ago`;
      trip._promptedComplete=true;
      await dbPut(ST.TRIPS,trip);
      // Show inline prompt on travel tab
      setTimeout(()=>showTripCompletePrompt(trip,label),400);
      break; // one prompt at a time
    }
  }
}

  const existing=document.getElementById('trip-complete-prompt');
  if(existing)existing.remove();

async function markTripComplete(tripId){
  const trip=trips.find(t=>t.id===tripId);if(!trip)return;
  trip.completed=true;trip.completedDate=todayStr();
  // Show cash carry-forward prompt if any cash balances
  const tripWithdrawals=atmDrawals.filter(a=>a.tripId===tripId);
  const currencies=[...new Set(tripWithdrawals.map(a=>a.currency))];
  await dbPut(ST.TRIPS,trip);
  document.getElementById('trip-complete-prompt')?.remove();
  if(activeTripId===tripId)activeTripId=null;
  _detectActiveTrip();
  if(currencies.length>0){

  }

async function payBillNow(billId){
  const b=bills.find(x=>x.id===billId);
  if(!b)return;
  const amount=parseFloat(document.getElementById('pbn-amt')?.value);
  const accName=document.getElementById('pbn-acc')?.value;
  const date=document.getElementById('pbn-date')?.value||todayStr();
  if(!accName){showToast('Select an account','red');return}
  if(!amount||isNaN(amount)||amount<=0){showToast('Enter valid amount','red');return}
  const acc=accs.find(a=>a.name===accName);
  if(!acc){showToast('Account not found','red');return}
  if(acc.balance<amount){showToast(`Insufficient funds in ${accName}`,'red');return}
  acc.balance-=amount;
  await dbPut(ST.ACC,acc);
  const tx={type:'expense',amount,account:accName,category:b.cat||'bills',description:`${b.name} payment`,date};
  const savedTx=await dbPut(ST.TX,tx);txs.push(savedTx);
  const bp={billId:b.id,billName:b.name,amount,account:accName,date,automatic:false};
  const savedBp=await dbPut(ST.BILLPAY,bp);billPayHistory.push(savedBp);
  b.dueDate=calcNextDueDate(date,b.freq);
  await dbPut(ST.BILLS,b);bills=await dbAll(ST.BILLS);
  await takeSnapshot('bill-payment');
  closeSheet();showToast(`${b.name} paid ✓ Next due ${fmtDate(b.dueDate)}`,'green');await renderView();
}

async function saveNewPayday(){
  const date=document.getElementById('np-date')?.value;

  const periodStart=document.getElementById('np-ps')?.value;
  const periodEnd=document.getElementById('np-pe')?.value;

  if(!bigSave){showToast('Big Save not found','red');return}
  const prevBalance=bigSave.balance;
  bigSave.balance+=amount;
  await dbPut(ST.ACC,bigSave);
  const incTx={type:'income',amount,account:'Big Save',category:'income',description:`Pay received — ${source||'Employment'}`,date};
  const savedInc=await dbPut(ST.TX,incTx);txs.push(savedInc);
  const transferList=payT.filter(t=>t.enabled).sort((a,b)=>a.order-b.order).map(t=>({templateId:t.id,name:t.name,amount:t.amount,fromAcc:t.fromAcc||'Big Save',toAcc:t.toAcc||'__external__',isExternal:t.isExternal||false,done:false}));
  const record={payDate:date,amount,periodStart,periodEnd,source,transfers:transferList,bigSaveBefore:prevBalance,bigSaveAfter:bigSave.balance,created:todayStr(),historical:false};

  await takeSnapshot('payday');

}

async function saveHistPayday(){
  const date=document.getElementById('hp-date')?.value;
  const periodStart=document.getElementById('hp-ps')?.value;
  const periodEnd=document.getElementById('hp-pe')?.value;
  const amount=parseFloat(document.getElementById('hp-amt')?.value);
  const source=document.getElementById('hp-src')?.value;
  const mode=document.querySelector('input[name="hp-mode"]:checked')?.value||'history';
  if(!date||!amount||isNaN(amount)||amount<=0){showToast('Fill all required fields','red');return}
  // Build transfer list with toggle state
  const transferList=payT.sort((a,b)=>a.order-b.order).map(t=>{
    const checked=document.getElementById(`hp-t-${t.id}`)?.checked;
    return{templateId:t.id,name:t.name,amount:t.amount,fromAcc:t.fromAcc||'Big Save',toAcc:t.toAcc||'__external__',isExternal:t.isExternal||false,done:checked!==false,completedDate:date};
  });
  let bigSaveBefore=0,bigSaveAfter=0;
  if(mode==='full'){
    // Full processing: deposit pay + apply all toggled-on transfers
    const bigSave=accs.find(a=>a.name==='Big Save');
    if(!bigSave){showToast('Big Save not found','red');return}
    bigSaveBefore=bigSave.balance;
    bigSave.balance+=amount;
    await dbPut(ST.ACC,bigSave);
    const incTx={type:'income',amount,account:'Big Save',category:'income',description:`Historical pay — ${source||'Employment'}`,date};
    const si=await dbPut(ST.TX,incTx);txs.push(si);
    // Process each toggled-on transfer
    for(const t of transferList){
      if(!t.done)continue;
      const af=accs.find(a=>a.name===t.fromAcc);
      if(af){af.balance-=t.amount;await dbPut(ST.ACC,af)}
      const txOut={type:'transfer',amount:t.amount,account:t.fromAcc,toAccount:t.isExternal?'External':t.toAcc,description:`${t.name} — historical payday`,date,category:'transfer'};
      const s1=await dbPut(ST.TX,txOut);txs.push(s1);
      if(!t.isExternal&&t.toAcc&&t.toAcc!=='__external__'){
        const at=accs.find(a=>a.name===t.toAcc);
        if(at){at.balance+=t.amount;await dbPut(ST.ACC,at);const txIn={type:'transfer',amount:t.amount,account:t.toAcc,fromAccount:t.fromAcc,description:`${t.name} from ${t.fromAcc}`,date,category:'transfer'};const s2=await dbPut(ST.TX,txIn);txs.push(s2)}
      }
    }
    bigSaveAfter=(accs.find(a=>a.name==='Big Save')||{}).balance||0;
    await takeSnapshot('historical-payday');
  }
  const record={payDate:date,amount,periodStart,periodEnd,source,transfers:transferList,bigSaveBefore,bigSaveAfter,created:todayStr(),historical:true,processingMode:mode};
  const saved=await dbPut(ST.PAYS,record);pays.push(saved);
  closeSheet();showToast(`Historical payday saved${mode==='full'?' + balances updated':' (history only)'} ✓`,'green');await renderView();
}

async function oneTapComplete(payId,transferIdx){
  const p=pays.find(x=>x.id===payId);if(!p||!p.transfers)return;
  const t=p.transfers[transferIdx];if(t.done)return;
  const fromAccName=t.fromAcc||'Big Save';
  const toAccName=t.toAcc;
  const amount=t.amount;
  const date=p.payDate||todayStr();
  const af=accs.find(a=>a.name===fromAccName);
  if(!af){showToast(`Account "${fromAccName}" not found`,'red');return}
  af.balance-=amount;await dbPut(ST.ACC,af);
  const txOut={type:'transfer',amount,account:fromAccName,toAccount:toAccName==='__external__'?'External':toAccName,description:`${t.name} — payday transfer`,date,category:'transfer'};
  const s1=await dbPut(ST.TX,txOut);txs.push(s1);
  if(toAccName&&toAccName!=='__external__'){
    const at=accs.find(a=>a.name===toAccName);
    if(at){at.balance+=amount;await dbPut(ST.ACC,at);const txIn={type:'transfer',amount,account:toAccName,fromAccount:fromAccName,description:`${t.name} from ${fromAccName}`,date,category:'transfer'};const s2=await dbPut(ST.TX,txIn);txs.push(s2);const mSF=sfs.find(s=>s.name===toAccName);if(mSF){mSF.current+=amount;await dbPut(ST.SF,mSF)}}
  }
  t.done=true;t.completedDate=date;
  await dbPut(ST.PAYS,p);await takeSnapshot('payday-transfer');
  renderPaydayDetailSheet(p);showToast(`${t.name} — ${fmt(amount)} ✓`,'green');
}

async function saveCreditRepay(accId){
  const amount=parseFloat(document.getElementById('cr-amt')?.value);
  const fromName=document.getElementById('cr-from')?.value;
  const date=document.getElementById('cr-date')?.value||todayStr();
  if(!amount||isNaN(amount)||amount<=0){showToast('Enter valid amount','red');return}
  const creditAcc=accs.find(a=>a.id===accId);
  const fromAcc=accs.find(a=>a.name===fromName);
  if(!creditAcc||!fromAcc){showToast('Account not found','red');return}
  creditAcc.owing=Math.max(0,(creditAcc.owing||Math.abs(creditAcc.balance||0))-amount);
  creditAcc.balance=-creditAcc.owing;
  await dbPut(ST.ACC,creditAcc);
  fromAcc.balance-=amount;await dbPut(ST.ACC,fromAcc);
  const s1=await dbPut(ST.TX,{type:'transfer',amount,account:fromName,toAccount:creditAcc.name,description:`Repayment — ${creditAcc.name}`,date,category:'transfer'});
  const s2=await dbPut(ST.TX,{type:'income',amount,account:creditAcc.name,description:`Repayment from ${fromName}`,date,category:'transfer'});
  txs.push(s1);txs.push(s2);
  await takeSnapshot('credit-repay');
  closeSheet();showToast(`${fmt(amount)} repaid to ${creditAcc.name} ✓`,'green');await renderView();
}

  const owing=acc.owing||Math.abs(acc.balance||0);

async function saveTx(){

  document.getElementById('sh-body').innerHTML=`

    <div class="fg"><label class="flabel">Amount</label><input class="finput" id="tf-a" type="number" placeholder="0.00" inputmode="decimal" step="0.01"></div>
    <div class="fg"><label class="flabel">Description</label><input class="finput" id="tf-d" placeholder="e.g. Savings transfer"></div>
    <div class="fg"><label class="flabel">Date</label><input class="finput" id="tf-dt" type="date" value="${todayStr()}"></div>
    <button class="btn btn-p" onclick="saveTransfer()">Execute Transfer</button>`;
}
async function saveTransfer(){
  const from=document.getElementById('tf-from')?.value,to=document.getElementById('tf-to')?.value;
  const amount=parseFloat(document.getElementById('tf-a')?.value);
  const desc=document.getElementById('tf-d')?.value,date=document.getElementById('tf-dt')?.value;
  if(from===to){showToast('Select different accounts','red');return}
  if(!amount||isNaN(amount)||amount<=0){showToast('Enter a valid amount','red');return}
  const af=accs.find(a=>a.name===from),at=accs.find(a=>a.name===to);
  if(!af||!at){showToast('Account not found','red');return}
  af.balance-=amount;at.balance+=amount;
  await dbPut(ST.ACC,af);await dbPut(ST.ACC,at);
  const sfTo=sfs.find(s=>s.name===to);if(sfTo){sfTo.current+=amount;await dbPut(ST.SF,sfTo)}
  const sfFrom=sfs.find(s=>s.name===from);if(sfFrom){sfFrom.current=Math.max(0,sfFrom.current-amount);await dbPut(ST.SF,sfFrom)}
  const s1=await dbPut(ST.TX,{type:'transfer',amount,account:from,toAccount:to,description:desc||`Transfer to ${to}`,date:date||todayStr(),category:'transfer'});
  const s2=await dbPut(ST.TX,{type:'transfer',amount,account:to,fromAccount:from,description:desc||`Transfer from ${from}`,date:date||todayStr(),category:'transfer'});
  txs.push(s1);txs.push(s2);
  await takeSnapshot('transfer');closeSheet();showToast(`Transferred ${fmt(amount)} ✓`,'green');await renderView();
}

  const fyLabel=now.getMonth()>=6?`FY${now.getFullYear()}/${String(now.getFullYear()+1).slice(-2)}`:`FY${now.getFullYear()-1}/${String(now.getFullYear()).slice(-2)}`;
  const fyTxs=txs.filter(t=>t.date>=fyStart&&t.date<=fyEnd);
  const fyPays=pays.filter(p=>p.payDate>=fyStart&&p.payDate<=fyEnd);
  const fyRents=rents.filter(r=>r.date>=fyStart&&r.date<=fyEnd);
  const empIncome=fyPays.filter(p=>p.source==='Employment'||!p.source).reduce((s,p)=>s+p.amount,0);

      <div class="nw-row"><span class="nw-lbl">Bowen Hills Rent</span><span class="nw-val pos">${fmt(bowenRent)}</span></div>
      <div class="nw-row" style="font-weight:700"><span>Total Income</span><span class="nw-val pos">${fmt(totalIncome)}</span></div>
    </div>
    <div class="rcard">
      <div class="rhdr">EXPENSES</div>
      <div class="nw-row"><span class="nw-lbl">Total Spending</span><span class="nw-val neg">−${fmt(totalExpenses)}</span></div>

      ${topCats.length?topCats.map(([c,a])=>`<div class="nw-row"><span class="nw-lbl">${emo(c)} ${c}</span><span class="nw-val neg">${fmt(a)}</span></div>`).join(''):'<div style="color:var(--t3);padding:8px 0;font-size:0.84rem">No transactions this year yet</div>'}

    <div class="fg"><label class="flabel">Notes (optional)</label><input class="finput" id="ar-note" placeholder="e.g. RBA rate cut"></div>

async function saveRate(propId,propName){
  const rate=parseFloat(document.getElementById('ar-rate')?.value);
  const effectiveDate=document.getElementById('ar-date')?.value;
  const note=document.getElementById('ar-note')?.value;
  if(!rate||isNaN(rate)){showToast('Enter valid rate','red');return}
  if(!effectiveDate){showToast('Enter effective date','red');return}
  const saved=await dbPut(ST.RATES,{propertyId:propId,propertyName:propName,rate,effectiveDate,note});
  rates.push(saved);
  const prop=props.find(p=>p.id===propId);
  if(prop){prop.interestRate=rate;await dbPut(ST.PROP,prop)}
  closeSheet();showToast(`${rate}% rate saved ✓`,'green');showProperties();
}

function buildCurrencyHeader(tripId){
  if(!tripId)return'';
  const at=getActiveTrip();
  // Use Wise as single source of truth — find which Wise records are linked to this trip
  // A currency is "trip currency" if it appears in exchange records tagged to this trip
  const tripExchCurrencies=[...new Set(wiseEx.filter(e=>e.tripId===tripId).map(e=>e.toCurrency))];
  // Also include currencies from spend records (in case first record was a spend, not exchange)
  const tripSpendCurrencies=[...new Set(wiseSp.filter(s=>s.tripId===tripId&&s.currency!=='AUD').map(s=>s.currency))];
  // Merge, deduplicate, then look up the Wise record for each — one lookup per currency code
  const allCodes=[...new Set([...tripExchCurrencies,...tripSpendCurrencies])];
  // Map strictly to Wise records — this guarantees one row per Wise record, no string duplication
  const seen=new Set();
  const tripWise=allCodes.reduce((acc,code)=>{
    const w=wise.find(x=>x.currency===code);
    if(w&&!seen.has(w.id)){seen.add(w.id);acc.push(w);}
    return acc;
  },[]);
  // No currencies yet
  if(tripWise.length===0){
    return'<div style="background:var(--card);border:1px solid rgba(255,255,255,0.055);border-radius:var(--r);padding:13px 15px;margin-bottom:11px">'

    +'</div>';

  const rows=tripWise.map(w=>{
    const cash=getCashBalance(w.currency);

    return'<div style="padding:14px;border-bottom:1px solid var(--border)">'
      +'<div style="display:flex;align-items:center;margin-bottom:10px">'
        +'<span style="font-size:1.6rem;margin-right:10px">'+w.flag+'</span>'
        +'<span style="font-size:1rem;font-weight:700;color:var(--t1)">'+w.currency+'</span>'
      +'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:9px">'
        +'<div style="background:rgba(0,212,180,0.07);border:1px solid rgba(0,212,180,0.15);border-radius:9px;padding:10px 12px">'
          +'<div style="font-size:0.62rem;color:var(--teal);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px">💳 Wise Card</div>'
          +'<div style="font-family:var(--mono);font-size:1.15rem;font-weight:700;color:var(--teal)">'+fmtF(w.amount,w.symbol)+'</div>'
        +'</div>'
        +'<div style="background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.15);border-radius:9px;padding:10px 12px">'
          +'<div style="font-size:0.62rem;color:var(--amber);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px">💵 Cash</div>'
          +'<div style="font-family:var(--mono);font-size:1.15rem;font-weight:700;color:var(--amber)">'+fmtF(cash,w.symbol)+'</div>'
        +'</div>'
      +'</div>'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-top:9px;padding-top:9px;border-top:1px solid rgba(255,255,255,0.05)">'
        +'<span style="font-size:0.7rem;color:var(--t3);font-family:var(--mono)">Total</span>'

async function renderTravel(){

    if(trip.completed)return{label:'Complete',col:'var(--t3)',past:true};
    if(!trip.startDate)return{label:'No dates',col:'var(--t3)',past:false};
    if(trip.endDate&&today>trip.endDate)return{label:'Ended',col:'var(--amber)',past:true};
    if(today>=trip.startDate)return{label:'Active',col:'var(--green)',past:false,active:true};

  const pastTrips=trips.filter(t=>tripStatus(t).past).sort((a,b)=>(b.startDate||'').localeCompare(a.startDate||''));

    if(!trip)return[];

        +'<button onclick="openSheet(\'amend-trip\',trips.find(t=>t.id==='+trip.id+'))" style="width:100%;margin-top:8px;padding:9px;background:none;border:1px solid var(--border);border-radius:9px;color:var(--t2);font-size:0.76rem;cursor:pointer;font-family:var(--mono)">✎ Edit Trip Details</button>'
        +'<button onclick="markTripComplete('+trip.id+')" style="width:100%;margin-top:6px;padding:9px;background:none;border:1px solid var(--border);border-radius:9px;color:var(--t3);font-size:0.76rem;cursor:pointer;font-family:var(--mono)">✓ Mark Trip Complete</button>'
      +'</div>'
    +'</div>';
  }

  const allActivity=[
    ...wiseSp.map(s=>({...s,_type:'spend',_date:s.date})),
    ...wiseEx.map(e=>({...e,_type:'exchange',_date:e.date})),
    ...atmDrawals.map(a=>({...a,_type:'atm',_date:a.date}))
  ].sort((a,b)=>b._date.localeCompare(a._date));

  const allCashCurs=getAllCashCurrencies().filter(c=>c.balance>0);

  function buildTripCostSummary(tripId){
    const costs=tripCosts.filter(c=>c.tripId===tripId);
    const actual=costs.filter(c=>c.status==='already-paid'||c.status==='pay-now').filter(c=>c.currency==='AUD').reduce((s,c)=>s+c.amount,0);
    const planned=costs.filter(c=>c.status==='planned').filter(c=>c.currency==='AUD').reduce((s,c)=>s+c.amount,0);
    const total=actual+planned;
    if(costs.length===0)return'';
    return'<div style="background:rgba(0,0,0,0.2);border-radius:8px;padding:10px 12px;margin-bottom:8px">'
      +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">'
        +'<div style="text-align:center"><div style="font-size:0.58rem;color:var(--green);font-family:var(--mono);text-transform:uppercase;margin-bottom:2px">Actual</div><div style="font-family:var(--mono);font-size:0.86rem;font-weight:700;color:var(--green)">'+fmt(actual)+'</div></div>'
        +'<div style="text-align:center"><div style="font-size:0.58rem;color:var(--amber);font-family:var(--mono);text-transform:uppercase;margin-bottom:2px">Planned</div><div style="font-family:var(--mono);font-size:0.86rem;font-weight:700;color:var(--amber)">'+fmt(planned)+'</div></div>'
        +'<div style="text-align:center"><div style="font-size:0.58rem;color:var(--teal);font-family:var(--mono);text-transform:uppercase;margin-bottom:2px">Total Est.</div><div style="font-family:var(--mono);font-size:0.86rem;font-weight:700;color:var(--teal)">'+fmt(total)+'</div></div>'
      +'</div>'
    +'</div>';
  }
  const renderTripCard=(trip)=>{
    const st=tripStatus(trip);
    const tripSpend=wiseSp.filter(s=>s.tripId===trip.id);
    const tripExch=wiseEx.filter(e=>e.tripId===trip.id);
    const tripAtm=atmDrawals.filter(a=>a.tripId===trip.id);
    const tripSettle=settlements.filter(s=>s.tripId===trip.id);
    const tripCostItems=tripCosts.filter(c=>c.tripId===trip.id);
    return`<div style="background:var(--card);border:1px solid rgba(255,255,255,0.055);border-radius:var(--r);margin-bottom:8px;overflow:hidden">
      <div style="padding:12px 14px;cursor:pointer" onclick="toggleTripCard(${trip.id})">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div><div style="font-size:0.88rem;font-weight:700">${trip.name}</div>
          <div style="font-size:0.68rem;color:var(--t3);font-family:var(--mono);margin-top:2px">${trip.startDate?fmtDateShort(trip.startDate):'?'}${trip.endDate?' → '+fmtDateShort(trip.endDate):''}</div></div>
          <div style="display:flex;align-items:center;gap:7px">
            <span style="font-size:0.7rem;font-family:var(--mono);font-weight:700;color:${st.col}">${st.label}</span>
            <button onclick="event.stopPropagation();openSheet('amend-trip',${JSON.stringify(trip).replace(/"/g,'&quot;')})" style="font-size:0.68rem;color:var(--t2);background:var(--inp);border:1px solid var(--border);border-radius:5px;padding:3px 7px;cursor:pointer;font-family:var(--mono)">Edit</button>
            ${activeTripId!==trip.id&&!trip.completed?`<button onclick="event.stopPropagation();setActiveTrip(${trip.id})" style="font-size:0.68rem;color:var(--teal);background:none;border:1px solid var(--border-teal);border-radius:5px;padding:3px 7px;cursor:pointer;font-family:var(--mono)">Set Active</button>`:''}
          </div>
        </div>
        <div style="display:flex;gap:10px;font-size:0.67rem;color:var(--t3);font-family:var(--mono);margin-top:6px">
          <span>💸 ${tripSpend.length}</span><span>💱 ${tripExch.length}</span><span>🏧 ${tripAtm.length}</span>
          ${tripSettle.filter(s=>!s.settled).length>0?`<span style="color:var(--amber)">⚖ ${tripSettle.filter(s=>!s.settled).length}</span>`:''}
        </div>
      </div>
      <div id="trip-body-${trip.id}" style="display:none;border-top:1px solid var(--border)">
        <div class="bank-group" id="tg-tx-${trip.id}" style="border-radius:0;border:none;border-bottom:1px solid var(--border)">
          <div class="bank-group-hdr" onclick="this.parentElement.classList.toggle('open')" style="padding:10px 14px"><span style="font-size:0.82rem;font-weight:600">💸 Transactions (${tripSpend.length})</span><span class="bank-chevron">▾</span></div>
          <div class="bank-group-body" style="padding:0 14px 10px">${tripSpend.length===0?'<div style="color:var(--t3);font-size:0.8rem;padding:10px 0">No spending yet</div>':tripSpend.sort((a,b)=>b.date.localeCompare(a.date)).map(s=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)"><div style="flex:1;min-width:0"><div style="font-size:0.84rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.desc||s.cat||'Spend'}</div><div style="font-size:0.67rem;color:var(--t3);font-family:var(--mono)">${emo(s.cat)} ${s.paySource||''} · ${fmtDate(s.date)}</div></div><span style="font-family:var(--mono);font-size:0.86rem;font-weight:600;color:var(--red);flex-shrink:0">−${fmtF(s.amount,s.symbol||'$')}</span><button onclick="openSheet('edit-spend',${JSON.stringify(s).replace(/"/g,'&quot;')})" style="flex-shrink:0;font-size:0.68rem;color:var(--t2);background:var(--inp);border:1px solid var(--border);border-radius:6px;padding:4px 7px;cursor:pointer;font-family:var(--mono)">Edit</button></div>`).join('')}</div>
        </div>
        <div class="bank-group" id="tg-ex-${trip.id}" style="border-radius:0;border:none;border-bottom:1px solid var(--border)">
          <div class="bank-group-hdr" onclick="this.parentElement.classList.toggle('open')" style="padding:10px 14px"><span style="font-size:0.82rem;font-weight:600">💱 Exchanges (${tripExch.length})</span><span class="bank-chevron">▾</span></div>
          <div class="bank-group-body" style="padding:0 14px 10px">${tripExch.length===0?'<div style="color:var(--t3);font-size:0.8rem;padding:10px 0">No exchanges yet</div>':tripExch.sort((a,b)=>b.date.localeCompare(a.date)).map(e=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)"><div style="flex:1"><div style="font-size:0.84rem">${e.fromAcc} → ${e.toCurrency}</div><div style="font-size:0.67rem;color:var(--t3);font-family:var(--mono)">${fmtDate(e.date)}</div></div><div style="text-align:right;flex-shrink:0"><div style="font-family:var(--mono);font-size:0.78rem;color:var(--red)">−${fmt(e.audAmount)}</div><div style="font-family:var(--mono);font-size:0.78rem;color:var(--green)">+${fmtF(e.foreignAmount,e.symbol||'')}</div></div><button onclick="openSheet('edit-exchange',${JSON.stringify(e).replace(/"/g,'&quot;')})" style="flex-shrink:0;font-size:0.68rem;color:var(--t2);background:var(--inp);border:1px solid var(--border);border-radius:6px;padding:4px 7px;cursor:pointer;font-family:var(--mono)">Edit</button></div>`).join('')}</div>
        </div>
        <div class="bank-group" id="tg-atm-${trip.id}" style="border-radius:0;border:none;border-bottom:1px solid var(--border)">
          <div class="bank-group-hdr" onclick="this.parentElement.classList.toggle('open')" style="padding:10px 14px"><span style="font-size:0.82rem;font-weight:600">🏧 Cash Withdrawals (${tripAtm.length})</span><span class="bank-chevron">▾</span></div>
          <div class="bank-group-body" style="padding:0 14px 10px">${tripAtm.length===0?'<div style="color:var(--t3);font-size:0.8rem;padding:10px 0">No withdrawals yet</div>':tripAtm.sort((a,b)=>b.date.localeCompare(a.date)).map(a=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)"><div><div style="font-size:0.84rem">${a.description||'ATM'}</div><div style="font-size:0.67rem;color:var(--t3);font-family:var(--mono)">${a.fromCard} · ${fmtDate(a.date)}</div></div><span style="font-family:var(--mono);font-size:0.86rem;font-weight:600;color:var(--amber)">+${fmtF(a.amount,a.symbol||'')}</span></div>`).join('')}</div>
        </div>
        <div class="bank-group" id="tg-st-${trip.id}" style="border-radius:0;border:none;border-bottom:1px solid var(--border)">
          <div class="bank-group-hdr" onclick="this.parentElement.classList.toggle('open')" style="padding:10px 14px">
            <span style="font-size:0.82rem;font-weight:600">⚖ Settlements (${tripSettle.filter(s=>!s.settled).length} open)</span>
            <div style="display:flex;align-items:center;gap:8px"><button onclick="event.stopPropagation();openAddSettlement(${trip.id})" style="font-size:0.68rem;color:var(--teal);background:none;border:1px solid var(--border-teal);border-radius:5px;padding:3px 8px;cursor:pointer;font-family:var(--mono)">+ Add</button><span class="bank-chevron">▾</span></div>
          </div>
          <div class="bank-group-body" style="padding:0 14px 10px">${tripSettle.length===0?'<div style="color:var(--t3);font-size:0.8rem;padding:10px 0">No settlements</div>':tripSettle.map(s=>`<div style="padding:9px 0;border-bottom:1px solid var(--border)"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><div><div style="font-size:0.84rem;font-weight:500">${s.direction==='owe-them'?'I owe '+s.person:s.person+' owes me'}</div><div style="font-size:0.68rem;color:var(--t3);font-family:var(--mono)">${s.description||''}</div></div><span style="font-family:var(--mono);font-size:0.86rem;font-weight:700;color:${s.direction==='owe-them'?'var(--red)':'var(--green)'}">${fmtF(s.currentBalance,s.symbol||'$')}</span></div><div style="display:flex;gap:7px">${s.settled?'<span style="font-size:0.68rem;color:var(--green);font-family:var(--mono)">✓ Settled</span>':`<button onclick="openSheet('offset-settlement',${JSON.stringify(s).replace(/"/g,'&quot;')})" style="font-size:0.68rem;color:var(--teal);background:none;border:1px solid var(--border-teal);border-radius:5px;padding:3px 8px;cursor:pointer;font-family:var(--mono)">Offset</button><button onclick="settleDebt(${s.id})" style="font-size:0.68rem;color:var(--green);background:none;border:1px solid rgba(16,185,129,0.3);border-radius:5px;padding:3px 8px;cursor:pointer;font-family:var(--mono)">Mark Settled</button>`}</div></div>`).join('')}</div>
        </div>
        <div class="bank-group" id="tg-costs-${trip.id}" style="border-radius:0;border:none">
          <div class="bank-group-hdr" onclick="this.parentElement.classList.toggle('open')" style="padding:10px 14px">
            <span style="font-size:0.82rem;font-weight:600">💰 Trip Costs (${tripCostItems.length})</span>
            <div style="display:flex;align-items:center;gap:8px"><button onclick="event.stopPropagation();openAddTripCost(${trip.id})" style="font-size:0.68rem;color:var(--teal);background:none;border:1px solid var(--border-teal);border-radius:5px;padding:3px 8px;cursor:pointer;font-family:var(--mono)">+ Add</button><span class="bank-chevron">▾</span></div>
          </div>
          <div class="bank-group-body" style="padding:0 14px 10px">
            ${buildTripCostSummary(trip.id)}
            ${tripCostItems.length===0?'<div style="color:var(--t3);font-size:0.8rem;padding:10px 0">No costs recorded yet</div>':tripCostItems.map(c=>{
              const statusCol=c.status==='already-paid'?'var(--green)':c.status==='pay-now'?'var(--blue)':'var(--amber)';
              const statusLabel=c.status==='already-paid'?'Paid':c.status==='pay-now'?'Paid Now':'Planned';
              return`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
                <div style="flex:1;min-width:0">
                  <div style="font-size:0.84rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.desc}</div>
                  <div style="font-size:0.67rem;color:var(--t3);font-family:var(--mono)">${c.cat} · ${fmtDate(c.date)} · <span style="color:${statusCol}">${statusLabel}</span>${c.paidFrom?' · '+c.paidFrom:c.paidRef?' · ref: '+c.paidRef:''}</div>
                </div>
                <span style="font-family:var(--mono);font-size:0.86rem;font-weight:600;flex-shrink:0;color:${c.status==='planned'?'var(--amber)':'var(--t1)'}">${c.currency==='AUD'?fmt(c.amount):fmtF(c.amount,c.symbol)}</span>
                <button onclick="openSheet('edit-trip-cost',${JSON.stringify(c).replace(/"/g,'&quot;')})" style="flex-shrink:0;font-size:0.68rem;color:var(--t2);background:var(--inp);border:1px solid var(--border);border-radius:6px;padding:4px 7px;cursor:pointer;font-family:var(--mono)">Edit</button>
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>
    </div>`;
  };

  el.innerHTML=`
    <div class="sh" style="margin-top:0"><span class="sh-title">Active Trip</span><button class="sh-btn" onclick="openSheet('add-trip')">+ New Trip</button></div>
    ${buildActiveTripBlock(activeTrip)}
    ${allActivity.length>0?`<div class="sh" style="margin-top:4px"><span class="sh-title">Recent Activity</span></div>${allActivity.slice(0,10).map(item=>{
      if(item._type==='spend')return`<div style="display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--border)"><div style="width:32px;height:32px;border-radius:8px;background:rgba(239,68,68,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0">${emo(item.cat)}</div><div style="flex:1;min-width:0"><div style="font-size:0.84rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${item.desc||item.cat||'Spend'}</div><div style="font-size:0.67rem;color:var(--t3);font-family:var(--mono)">${item.paySource||''} · ${fmtDate(item._date)}</div></div><span style="font-family:var(--mono);font-size:0.86rem;font-weight:600;color:var(--red);flex-shrink:0">−${fmtF(item.amount,item.symbol||'$')}</span><button onclick="openSheet('edit-spend',${JSON.stringify(item).replace(/"/g,'&quot;')})" style="flex-shrink:0;font-size:0.66rem;color:var(--t2);background:var(--inp);border:1px solid var(--border);border-radius:6px;padding:4px 6px;cursor:pointer;font-family:var(--mono)">Edit</button></div>`;
      if(item._type==='atm')return`<div style="display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--border)"><div style="width:32px;height:32px;border-radius:8px;background:rgba(245,158,11,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0">🏧</div><div style="flex:1;min-width:0"><div style="font-size:0.84rem;font-weight:500">ATM Withdrawal</div><div style="font-size:0.67rem;color:var(--t3);font-family:var(--mono)">${item.fromCard} · ${fmtDate(item._date)}</div></div><span style="font-family:var(--mono);font-size:0.86rem;font-weight:600;color:var(--amber);flex-shrink:0">+${fmtF(item.amount,item.symbol||'')}</span></div>`;
      return`<div style="display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--border)"><div style="width:32px;height:32px;border-radius:8px;background:rgba(0,212,180,0.08);display:flex;align-items:center;justify-content:center;flex-shrink:0">💱</div><div style="flex:1;min-width:0"><div style="font-size:0.84rem;font-weight:500">Exchange → ${item.toCurrency}</div><div style="font-size:0.67rem;color:var(--t3);font-family:var(--mono)">${item.fromAcc} · ${fmtDate(item._date)}</div></div><div style="text-align:right;flex-shrink:0"><div style="font-family:var(--mono);font-size:0.75rem;color:var(--red)">−${fmt(item.audAmount)}</div><div style="font-family:var(--mono);font-size:0.75rem;color:var(--green)">+${fmtF(item.foreignAmount,item.symbol||'')}</div></div><button onclick="openSheet('edit-exchange',${JSON.stringify(item).replace(/"/g,'&quot;')})" style="flex-shrink:0;font-size:0.66rem;color:var(--t2);background:var(--inp);border:1px solid var(--border);border-radius:6px;padding:4px 6px;cursor:pointer;font-family:var(--mono)">Edit</button></div>`;
    }).join('')}`:''}
    ${allCashCurs.length>0?`<div class="bank-group" id="leftover-cash-group" style="margin-top:12px"><div class="bank-group-hdr" onclick="this.parentElement.classList.toggle('open')"><div class="bank-group-left"><span style="font-size:0.9rem">💵</span><span class="bank-group-name">Leftover Travel Cash</span></div><span class="bank-chevron">▾</span></div><div class="bank-group-body" style="padding:0"><div style="padding:10px 14px;font-size:0.74rem;color:var(--t3)">Physical cash remaining from all trips</div>${allCashCurs.map(c=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-top:1px solid var(--border)"><div style="display:flex;align-items:center;gap:9px"><span style="font-size:0.88rem;font-weight:600">${c.currency}</span></div><span style="font-family:var(--mono);font-size:0.95rem;font-weight:700;color:var(--amber)">${fmtF(c.balance,c.symbol)}</span></div>`).join('')}</div></div>`:''}
    ${upcomingTrips.length>0?`<div class="bank-group" id="upcoming-trips-group" style="margin-top:9px"><div class="bank-group-hdr" onclick="this.parentElement.classList.toggle('open')"><div class="bank-group-left"><span style="font-size:0.9rem">📅</span><span class="bank-group-name">Upcoming (${upcomingTrips.length})</span></div><span class="bank-chevron">▾</span></div><div class="bank-group-body" style="padding:10px">${upcomingTrips.map(t=>renderTripCard(t)).join('')}</div></div>`:''}
    ${pastTrips.length>0?`<div class="bank-group" id="past-trips-group" style="margin-top:9px"><div class="bank-group-hdr" onclick="this.parentElement.classList.toggle('open')"><div class="bank-group-left"><span style="font-size:0.9rem">🗂</span><span class="bank-group-name">Past Trips (${pastTrips.length})</span></div><span class="bank-chevron">▾</span></div><div class="bank-group-body" style="padding:10px">${pastTrips.map(t=>renderTripCard(t)).join('')}</div></div>`:''}
  `;
}

function toggleTripCard(id){
  const el=document.getElementById(`trip-body-${id}`);
  if(el)el.style.display=el.style.display==='none'?'block':'none';
}
async function setActiveTrip(tripId){
  activeTripId=tripId;
  showToast('Active trip updated ✓','green');
  await renderView();
}

// ===== ATM WITHDRAWAL SHEET =====
function renderATMWithdrawSheet(){
  const activeTrip=getActiveTrip();
  const tripOpts=`<option value="">No trip</option>`+trips.map(t=>`<option value="${t.id}" ${t.id===activeTripId?'selected':''}>${t.name}</option>`).join('');
  // Wise card and Macquarie Transaction Account only
  const macTrans=accs.find(a=>a.name==='Transaction Account');
  const cardOpts=[
    ...wise.filter(w=>w.currency!=='AUD').map(w=>`<option value="Wise ${w.currency}">Wise ${w.currency} Card (${fmtF(w.amount,w.symbol)})</option>`),
    macTrans?`<option value="Transaction Account">Macquarie Transaction (${fmt(macTrans.balance)} AUD)</option>`:''
  ].join('');
  const atmActiveTrip=getActiveTrip();
  const atmTripCurs=atmActiveTrip&&atmActiveTrip.currencies&&atmActiveTrip.currencies.length>0
    ?atmActiveTrip.currencies.map(code=>wise.find(w=>w.currency===code)).filter(Boolean)
    :wise.filter(w=>w.currency!=='AUD');
  const curOpts=atmTripCurs.map(w=>`<option value="${w.id}">${w.flag} ${w.currency}</option>`).join('');
  document.getElementById('sh-title').textContent='ATM Withdrawal';
  document.getElementById('sh-body').innerHTML=`
    ${activeTrip?`<div style="background:rgba(16,185,129,0.07);border:1px solid rgba(16,185,129,0.2);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:13px;font-size:0.78rem;color:var(--t2)">Active trip: <strong style="color:var(--green)">${activeTrip.name}</strong></div>`:''}
    <div class="fg"><label class="flabel">Withdraw From Card</label>
      <select class="fselect" id="atm-card" onchange="toggleATMAudField()">${cardOpts}</select>
    </div>
    <div id="atm-aud-section" style="display:none">
      <div style="background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.2);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:10px;font-size:0.78rem;color:var(--t2)">
        Macquarie card charges in AUD. Enter the VND amount you received and the AUD charged to your card.
      </div>
      <div class="fg"><label class="flabel">AUD Charged to Macquarie</label><input class="finput" id="atm-aud" type="number" placeholder="e.g. 92.50" inputmode="decimal" step="0.01"></div>
    </div>

  document.getElementById('atm-aud-section').style.display=show?'block':'none';

async function saveATMWithdrawal(){
  const fromCard=document.getElementById('atm-card')?.value;
  const curId=parseInt(document.getElementById('atm-cur')?.value);
  const amount=parseFloat(document.getElementById('atm-amount')?.value);
  const date=document.getElementById('atm-date')?.value||todayStr();
  const tripId=parseInt(document.getElementById('atm-trip')?.value)||null;
  const notes=document.getElementById('atm-notes')?.value||'';
  if(!amount||isNaN(amount)||amount<=0){showToast('Enter withdrawal amount','red');return}
  const cur=wise.find(w=>w.id===curId);
  if(!cur){showToast('Select currency','red');return}
  // Deduct from source card
  if(fromCard.startsWith('Wise ')){
    const wiseCur=wise.find(w=>`Wise ${w.currency}`===fromCard);
    if(wiseCur){
      if(wiseCur.amount<amount){showToast(`Insufficient ${wiseCur.currency} in Wise`,'red');return}
      wiseCur.amount-=amount;await dbPut(ST.WISE,wiseCur);wise=await dbAll(ST.WISE);
    }
  } else if(fromCard==='Transaction Account'){
    // Macquarie card: deduct AUD from account balance
    const audCharged=parseFloat(document.getElementById('atm-aud')?.value)||0;
    if(!audCharged||audCharged<=0){showToast('Enter AUD amount charged to Macquarie','red');return}
    const acc=accs.find(a=>a.name==='Transaction Account');
    if(!acc){showToast('Transaction Account not found','red');return}
    if(acc.balance<audCharged){showToast('Insufficient funds in Transaction Account','red');return}
    acc.balance-=audCharged;await dbPut(ST.ACC,acc);
    // Record AUD transaction
    const txRec={type:'expense',amount:audCharged,account:'Transaction Account',description:`ATM withdrawal ${fmtF(amount,cur.symbol)}`,date,category:'travel'};
    const st=await dbPut(ST.TX,txRec);txs.push(st);
    // Store aud amount on record for history
    var audCharge=audCharged;
  }
  // Add foreign amount to cash in hand
  const curCash=getCashBalance(cur.currency);
  await setCashBalance(cur.currency,cur.symbol,curCash+amount);
  cashInHand=await dbAll(ST.CASH);
  // Record withdrawal
  const rec={currency:cur.currency,symbol:cur.symbol,amount,fromCard,audCharge:audCharge||null,date,tripId,description:notes||'ATM Withdrawal'};
  const saved=await dbPut(ST.ATMDRAW,rec);atmDrawals.push(saved);
  closeSheet();showToast(`${fmtF(amount,cur.symbol)} withdrawn · Cash now ${fmtF(curCash+amount,cur.symbol)} ✓`,'green');await renderView();
}

  } else if(paySource==='credit-hsbc'){
    const audCharge=parseFloat(document.getElementById('ws-audcharge')?.value)||0;
    const hsbcCard=accs.find(a=>a.name==='Credit Card');
    if(hsbcCard&&audCharge>0){
      hsbcCard.owing=(hsbcCard.owing||0)+audCharge;hsbcCard.balance=-hsbcCard.owing;
      await dbPut(ST.ACC,hsbcCard);
      const tx={type:'expense',amount:audCharge,account:'Credit Card',description:`${desc} (${fmtF(amount,cur.symbol)})`,date,category:cat||'travel'};
      const s=await dbPut(ST.TX,tx);txs.push(s);
    }
    paySourceLabel='HSBC Credit';
  } else if(paySource.startsWith('aud-')){
    const accName=paySource.replace('aud-','');
    const audAmount=parseFloat(document.getElementById('ws-audamount')?.value)||0;
    const acc=accs.find(a=>a.name===accName);
    if(acc&&audAmount>0){
      if(acc.balance<audAmount){showToast('Insufficient AUD funds','red');return}
      acc.balance-=audAmount;await dbPut(ST.ACC,acc);
      const tx={type:'expense',amount:audAmount,account:accName,description:`${desc} (${fmtF(amount,cur.symbol)})`,date,category:cat||'travel'};
      const s=await dbPut(ST.TX,tx);txs.push(s);
    }
    paySourceLabel=accName==='Transaction Account'?'Macquarie':accName;
  }

  const saved=await dbPut(ST.WISESP,{currency:cur.currency,symbol:cur.symbol,amount,desc,cat,date,tripId,notes,paySource:paySourceLabel});wiseSp.push(saved);
  closeSheet();showToast(`${fmtF(amount,cur.symbol)} recorded ✓`,'green');await renderView();
}

async function saveEditExchange(id){
  const fromAccName=document.getElementById('ee-from')?.value;
  const audAmount=parseFloat(document.getElementById('ee-aud')?.value);
  const toCurId=parseInt(document.getElementById('ee-tocur')?.value);
  const foreignAmount=parseFloat(document.getElementById('ee-foreign')?.value);
  const date=document.getElementById('ee-date')?.value||todayStr();
  const tripId=parseInt(document.getElementById('ee-trip')?.value)||null;
  const desc=document.getElementById('ee-desc')?.value;
  if(!audAmount||isNaN(audAmount)||audAmount<=0){showToast('Enter AUD amount','red');return}
  if(!foreignAmount||isNaN(foreignAmount)||foreignAmount<=0){showToast('Enter foreign amount','red');return}
  const orig=wiseEx.find(x=>x.id===id);if(!orig)return;
  // Reverse original: refund AUD to fromAcc, deduct foreign from Wise
  const origFromAcc=accs.find(a=>a.name===orig.fromAcc);
  if(origFromAcc){origFromAcc.balance+=orig.audAmount;await dbPut(ST.ACC,origFromAcc)}
  const origToCur=wise.find(w=>w.currency===orig.toCurrency);
  if(origToCur){origToCur.amount=Math.max(0,origToCur.amount-orig.foreignAmount);await dbPut(ST.WISE,origToCur)}
  // Apply new values
  const newFromAcc=accs.find(a=>a.name===fromAccName);
  const newToCur=wise.find(w=>w.id===toCurId);
  if(!newFromAcc||!newToCur){showToast('Account not found','red');return}
  if(newFromAcc.balance<audAmount){showToast('Insufficient funds','red');return}
  newFromAcc.balance-=audAmount;await dbPut(ST.ACC,newFromAcc);
  newToCur.amount+=foreignAmount;await dbPut(ST.WISE,newToCur);
  wise=await dbAll(ST.WISE);
  // Update record
  const updated={...orig,fromAcc:fromAccName,toCurrency:newToCur.currency,symbol:newToCur.symbol,audAmount,foreignAmount,date,tripId,desc};
  await dbPut(ST.WISEEX,updated);
  const idx=wiseEx.findIndex(x=>x.id===id);if(idx>=0)wiseEx[idx]=updated;
  closeSheet();showToast('Exchange updated ✓','green');await renderView();
}

  showInlineConfirm('Delete this exchange? Balances will be reversed and cannot be undone.','Delete Exchange','red',async()=>{await _doDeleteExchange(id)});
}

async function saveEditSpend(id){
  const spendType=document.getElementById('es-type')?.value;
  const desc=document.getElementById('es-desc')?.value;
  const cat=document.getElementById('es-cat')?.value;
  const date=document.getElementById('es-date')?.value||todayStr();
  const tripId=parseInt(document.getElementById('es-trip')?.value)||null;
  const orig=wiseSp.find(x=>x.id===id);if(!orig)return;
  // Reverse original
  if(orig.currency==='AUD'&&orig.fromAcc){
    const oa=accs.find(a=>a.name===orig.fromAcc);
    if(oa){oa.balance+=orig.amount;await dbPut(ST.ACC,oa)}
  } else {
    const oc=wise.find(w=>w.currency===orig.currency);
    if(oc){oc.amount+=orig.amount;await dbPut(ST.WISE,oc)}
  }
  let updated;
  if(spendType==='foreign'){
    const curId=parseInt(document.getElementById('es-cur')?.value);
    const famount=parseFloat(document.getElementById('es-famount')?.value);
    if(!famount||isNaN(famount)||famount<=0){showToast('Enter amount','red');return}
    const cur=wise.find(w=>w.id===curId);if(!cur){showToast('Select currency','red');return}
    if(cur.amount<famount){showToast(`Insufficient ${cur.currency}`,'red');return}
    cur.amount-=famount;await dbPut(ST.WISE,cur);wise=await dbAll(ST.WISE);
    updated={...orig,currency:cur.currency,symbol:cur.symbol,amount:famount,desc,cat,date,tripId,fromAcc:null};
  } else {
    const accName=document.getElementById('es-audacc')?.value;
    const audAmount=parseFloat(document.getElementById('es-audamount')?.value);
    if(!accName||!audAmount||isNaN(audAmount)||audAmount<=0){showToast('Fill all fields','red');return}
    const acc=accs.find(a=>a.name===accName);
    if(!acc||acc.balance<audAmount){showToast('Insufficient funds','red');return}
    acc.balance-=audAmount;await dbPut(ST.ACC,acc);
    updated={...orig,currency:'AUD',symbol:'$',amount:audAmount,desc,cat,date,tripId,fromAcc:accName};
  }
  await dbPut(ST.WISESP,updated);
  const idx=wiseSp.findIndex(x=>x.id===id);if(idx>=0)wiseSp[idx]=updated;
  closeSheet();showToast('Spending updated ✓','green');await renderView();
}

      ${hasRecords?`<div style="background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);border-radius:var(--r-sm);padding:11px 13px;margin-bottom:10px;font-size:0.78rem;color:var(--t2)">⚠ This trip has transactions, exchanges or withdrawals recorded. Deleting will permanently remove all of them.</div>`:''}
      <button class="btn btn-d" onclick="confirmDeleteTrip(${trip.id},'${(trip.name||'').replace(/'/g,"\\'")}',${hasRecords})">Delete Trip</button>

async function saveAmendTrip(tripId){
  const trip=trips.find(t=>t.id===tripId);if(!trip)return;
  const newCurs=[...document.querySelectorAll('input[name="at-cur"]:checked')].map(el=>el.value);
  trip.name=document.getElementById('at-name')?.value?.trim()||trip.name;
  trip.destination=document.getElementById('at-dest')?.value||'';
  trip.currencies=newCurs.length>0?newCurs:(trip.currencies||[]);
  trip.budget=parseFloat(document.getElementById('at-budget')?.value)||null;
  trip.startDate=document.getElementById('at-start')?.value||'';
  trip.endDate=document.getElementById('at-end')?.value||'';
  await dbPut(ST.TRIPS,trip);
  const idx=trips.findIndex(t=>t.id===tripId);if(idx>=0)trips[idx]=trip;
  _detectActiveTrip();
  closeSheet();showToast('Trip updated ✓','green');await renderView();
}
function confirmDeleteTrip(tripId,tripName,hasRecords){
  const msg=hasRecords
    ?`Delete "${tripName}"? This will permanently delete the trip AND all its transactions, exchanges, ATM withdrawals and settlements. This cannot be undone.`
    :`Delete "${tripName}"? This cannot be undone.`;
  showInlineConfirm(msg,'Delete Trip','red',()=>deleteTrip(tripId));
}
async function deleteTrip(tripId){
  // Delete trip record
  await dbDel(ST.TRIPS,tripId);trips=trips.filter(t=>t.id!==tripId);
  // Delete linked records
  const spends=wiseSp.filter(s=>s.tripId===tripId);
  for(const s of spends){await dbDel(ST.WISESP,s.id)}
  wiseSp=wiseSp.filter(s=>s.tripId!==tripId);
  const exchs=wiseEx.filter(e=>e.tripId===tripId);
  for(const e of exchs){await dbDel(ST.WISEEX,e.id)}
  wiseEx=wiseEx.filter(e=>e.tripId!==tripId);
  const atms=atmDrawals.filter(a=>a.tripId===tripId);
  for(const a of atms){await dbDel(ST.ATMDRAW,a.id)}
  atmDrawals=atmDrawals.filter(a=>a.tripId!==tripId);
  const sett=settlements.filter(s=>s.tripId===tripId);
  for(const s of sett){await dbDel(ST.SETTLEMENTS,s.id)}
  settlements=settlements.filter(s=>s.tripId!==tripId);
  if(activeTripId===tripId)activeTripId=null;
  _detectActiveTrip();
  closeSheet();showToast('Trip deleted','red');await renderView();
}

function showInlineConfirm(message, actionLabel, color, onConfirm){
  // Remove any existing confirm overlay
  document.getElementById('inline-confirm')?.remove();
  const el=document.createElement('div');

  // z-index 700 — above sheet (301), overlay (300), and toast (600)
  el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:700;display:flex;align-items:flex-end;padding:0';
  el.innerHTML=`<div style="background:var(--sheet);border-radius:22px 22px 0 0;padding:22px 20px 32px;width:100%;max-width:480px;margin:0 auto;padding-bottom:calc(22px + env(safe-area-inset-bottom))">

    <div style="font-size:0.95rem;font-weight:700;color:var(--t1);margin-bottom:8px">${actionLabel}</div>
    <div style="font-size:0.84rem;color:var(--t2);margin-bottom:22px;line-height:1.5">${message}</div>

// Refactored exchange/spend delete to work with async inline confirm
async function _doDeleteExchange(id){
  const orig=wiseEx.find(x=>x.id===id);if(!orig)return;
  const origFromAcc=accs.find(a=>a.name===orig.fromAcc);
  if(origFromAcc){origFromAcc.balance+=orig.audAmount;await dbPut(ST.ACC,origFromAcc)}
  const origToCur=wise.find(w=>w.currency===orig.toCurrency);
  if(origToCur){origToCur.amount=Math.max(0,origToCur.amount-orig.foreignAmount);await dbPut(ST.WISE,origToCur);wise=await dbAll(ST.WISE)}
  await dbDel(ST.WISEEX,id);wiseEx=wiseEx.filter(x=>x.id!==id);
  closeSheet();showToast('Exchange deleted','red');await renderView();
}
async function _doDeleteSpend(id){
  const orig=wiseSp.find(x=>x.id===id);if(!orig)return;
  if(orig.currency==='AUD'&&orig.fromAcc){
    const oa=accs.find(a=>a.name===orig.fromAcc);
    if(oa){oa.balance+=orig.amount;await dbPut(ST.ACC,oa)}
  } else {
    const oc=wise.find(w=>w.currency===orig.currency);
    if(oc){oc.amount+=orig.amount;await dbPut(ST.WISE,oc);wise=await dbAll(ST.WISE)}
  }
  await dbDel(ST.WISESP,id);wiseSp=wiseSp.filter(x=>x.id!==id);
  closeSheet();showToast('Spending deleted','red');await renderView();
}

async function saveTripCost(tripId){
  const desc=document.getElementById('tc-desc')?.value?.trim();
  const cat=document.getElementById('tc-cat')?.value;
  const amount=parseFloat(document.getElementById('tc-amount')?.value);
  const currency=document.getElementById('tc-currency')?.value;
  const date=document.getElementById('tc-date')?.value||todayStr();
  const status=document.getElementById('tc-status')?.value;
  const notes=document.getElementById('tc-notes')?.value||'';
  if(!desc){showToast('Enter a description','red');return}
  if(!amount||isNaN(amount)||amount<=0){showToast('Enter a valid amount','red');return}
  const sym=wise.find(w=>w.currency===currency)?.symbol||'$';
  let paidFrom=null,paidRef=null;
  if(status==='pay-now'){
    paidFrom=document.getElementById('tc-pay-from')?.value;
    if(!paidFrom){showToast('Select account to pay from','red');return}
    const acc=accs.find(a=>a.name===paidFrom);
    if(!acc){showToast('Account not found','red');return}
    // For AUD deduct directly; for foreign currencies we record as reference, AUD field could be added later
    const deductAmt=currency==='AUD'?amount:0; // foreign spend recorded as reference
    if(currency==='AUD'&&acc.balance<amount){showToast('Insufficient funds','red');return}
    if(currency==='AUD'){acc.balance-=amount;await dbPut(ST.ACC,acc)}
    const tx={type:'expense',amount:currency==='AUD'?amount:0,account:paidFrom,description:desc,date,category:cat||'travel'};
    if(currency==='AUD'){const s=await dbPut(ST.TX,tx);txs.push(s)}
  } else if(status==='already-paid'){
    paidRef=document.getElementById('tc-paid-ref')?.value||'';
  }
  const rec={tripId,desc,cat,amount,currency,symbol:sym,date,status,paidFrom,paidRef,notes,created:todayStr()};
  const saved=await dbPut(ST.TRIPCOSTS,rec);tripCosts.push(saved);
  closeSheet();showToast(`${desc} saved ✓`,'green');await renderView();
}

function buildMiniChart(snapshots,currentBalance){
  const all=[...snapshots];
  if(all.length===0)return`<div class="chart-wrap" style="display:flex;align-items:center;justify-content:center;font-size:0.72rem;color:var(--t3)">No history yet</div>`;
  const vals=all.map(s=>s.balance);vals.push(currentBalance);
  const min=Math.min(...vals),max=Math.max(...vals),range=max-min||1;
  const w=300,h=100,pad=4;
  const points=vals.map((v,i)=>{const x=pad+((i/(vals.length-1))*(w-pad*2));const y=h-pad-((v-min)/range*(h-pad*2));return`${x.toFixed(1)},${y.toFixed(1)}`}).join(' ');
  const lastPt=points.split(' ').pop().split(',');const lastX=parseFloat(lastPt[0]),lastY=parseFloat(lastPt[1]);
  const isUp=vals[vals.length-1]>=vals[0];const lineColor=isUp?'#10B981':'#EF4444';
  const fillPath=`M${pad},${h} ${points.split(' ').map(p=>`L${p}`).join(' ')} L${lastX},${h} Z`;
  return`<div class="chart-wrap"><svg class="chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><path d="${fillPath}" fill="${isUp?'rgba(16,185,129,0.08)':'rgba(239,68,68,0.06)'}"/><polyline points="${points}" fill="none" stroke="${lineColor}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><circle cx="${lastX}" cy="${lastY}" r="3" fill="${lineColor}"/></svg></div>`;
}

async function exportBackup(){
  const data={_exported:new Date().toISOString(),_version:5};
  for(const[,name]of Object.entries(ST))data[name]=await dbAll(name);
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`fincommand-v5-${todayStr()}.json`;a.click();
  URL.revokeObjectURL(url);showToast('Backup exported ✓','green');
}
function importBackup(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    try{
      const data=JSON.parse(await file.text());
      if(!data.accounts){showToast('Invalid file','red');return}
      showInlineConfirm('Replace ALL current data with this backup? This cannot be undone.','Restore Backup','red',async()=>{
        for(const[,name]of Object.entries(ST)){if(data[name]){await dbClear(name);for(const item of data[name])await dbPut(name,item)}}
        await loadAll();await renderView();showToast('Restored ✓','green');
      });
    }catch{showToast('Import failed','red')}
  };inp.click();
}

// ===== BOOT =====
document.addEventListener('DOMContentLoaded',init);
if('serviceWorker' in navigator){
  const swCode=`
    const CACHE='fincommand-v2';
    const START='/Fincommand-pwa/financial-command-centre-v5.html';
    self.addEventListener('install',e=>{
      e.waitUntil(caches.open(CACHE).then(c=>c.add(START)).catch(()=>{}));
      self.skipWaiting();
    });
    self.addEventListener('activate',e=>{
      e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
      self.clients.claim();
    });
    self.addEventListener('fetch',e=>{
      e.respondWith(caches.match(e.request).then(r=>{
        if(r)return r;
        return fetch(e.request).then(res=>{
          if(res&&res.status===200){
            const clone=res.clone();
            caches.open(CACHE).then(c=>c.put(e.request,clone));
          }
          return res;
        }).catch(()=>caches.match(START));
      }));
    });
  `;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl,{scope:'/Fincommand-pwa/'}).catch(e=>console.log('SW:',e));
}
